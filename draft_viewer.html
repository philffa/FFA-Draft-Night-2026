<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FFA Draft Night 2026 — Live Viewer</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0f14;
    --surface: #161920;
    --surface2: #1e2230;
    --border: rgba(255,255,255,0.08);
    --border-strong: rgba(255,255,255,0.18);
    --text: #f0f2f7;
    --muted: #6b7280;
    --mens: #f97316;
    --womens: #a78bfa;
    --rookie: #22d3ee;
    --rookie-bg: rgba(34,211,238,0.08);
    --rookie-border: rgba(34,211,238,0.3);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; }

  /* ── Header ── */
  .header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 1.25rem 2rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 1rem;
    flex-wrap: wrap;
  }
  .header-left h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.8rem;
    letter-spacing: 0.08em;
    line-height: 1;
    background: linear-gradient(90deg, var(--mens), var(--womens));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .header-left p { font-size: 0.75rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; margin-top: 3px; }
  .header-right { display: flex; align-items: center; gap: 0.75rem; flex-wrap: wrap; }
  .live-badge {
    display: flex;
    align-items: center;
    gap: 6px;
    background: rgba(34,197,94,0.12);
    border: 1px solid rgba(34,197,94,0.3);
    color: #4ade80;
    font-size: 0.72rem;
    font-weight: 600;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    padding: 4px 10px;
    border-radius: 20px;
  }
  .live-dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: #4ade80;
    animation: pulse 1.5s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.4;transform:scale(0.8)} }
  .refresh-info { font-size: 0.72rem; color: var(--muted); }
  #countdown { color: var(--text); font-weight: 600; }

  /* ── Tabs ── */
  .tabs {
    display: flex;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 2rem;
    gap: 0;
  }
  .tab-btn {
    padding: 0.85rem 1.5rem;
    background: transparent;
    border: none;
    border-bottom: 3px solid transparent;
    color: var(--muted);
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.1rem;
    letter-spacing: 0.06em;
    cursor: pointer;
    transition: color 0.15s, border-color 0.15s;
  }
  .tab-btn:hover { color: var(--text); }
  .tab-btn.active.mens { color: var(--mens); border-bottom-color: var(--mens); }
  .tab-btn.active.womens { color: var(--womens); border-bottom-color: var(--womens); }
  .tab-count {
    display: inline-block;
    background: var(--surface2);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.65rem;
    font-weight: 600;
    padding: 1px 7px;
    border-radius: 20px;
    margin-left: 6px;
    vertical-align: middle;
    letter-spacing: 0;
  }

  /* ── Tab panels ── */
  .tab-panel { display: none; }
  .tab-panel.active { display: block; }

  /* ── Division header bar ── */
  .div-header {
    padding: 1rem 2rem;
    display: flex;
    align-items: center;
    gap: 1rem;
    flex-wrap: wrap;
    border-bottom: 1px solid var(--border);
  }
  .div-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.4rem;
    letter-spacing: 0.06em;
    line-height: 1;
  }
  .div-meta { font-size: 0.75rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.04em; }
  .picks-done {
    margin-left: auto;
    font-size: 0.8rem;
    color: var(--muted);
  }
  .picks-done b { color: var(--text); }

  /* ── Team cards ── */
  .team-grid {
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    gap: 8px;
    padding: 1rem 2rem;
  }
  @media (max-width: 900px) { .team-grid { grid-template-columns: repeat(3, 1fr); } }
  @media (max-width: 520px) { .team-grid { grid-template-columns: repeat(2, 1fr); } }

  .team-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0.55rem 0.7rem;
    border-top: 3px solid var(--tc);
  }
  .team-card .tc-label { font-size: 0.65rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.04em; }
  .team-card .tc-name { font-size: 0.82rem; font-weight: 600; color: var(--text); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .team-card .tc-gm { font-size: 0.65rem; color: var(--muted); margin-top: 2px; }
  .team-card .tc-picks { font-size: 0.7rem; color: var(--muted); margin-top: 3px; }
  .team-card .tc-picks b { color: var(--text); }

  /* ── Table ── */
  .table-wrap { padding: 0 2rem 2rem; overflow-x: auto; }
  @media (max-width: 600px) { .table-wrap { padding: 0 0.75rem 1.5rem; } }

  table { width: 100%; border-collapse: collapse; font-size: 0.82rem; }
  thead th {
    background: var(--surface);
    color: var(--muted);
    font-size: 0.68rem;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    font-weight: 500;
    padding: 0.6rem 0.75rem;
    text-align: left;
    border-bottom: 1px solid var(--border-strong);
    white-space: nowrap;
  }
  thead th:nth-child(1), thead th:nth-child(2), thead th:nth-child(3) { width: 48px; text-align: center; }
  thead th:nth-child(4) { width: 130px; }
  thead th:nth-child(6) { width: 100px; }

  tbody tr { transition: background 0.1s; }
  tbody tr:hover td { background: var(--surface); }
  tbody tr.rookie-row td { background: var(--rookie-bg); }
  tbody tr.rookie-row:hover td { background: rgba(34,211,238,0.12); }
  tbody tr.round-start td { border-top: 1px solid var(--border-strong); }
  tbody tr.empty-pick td { opacity: 0.35; }

  td {
    padding: 0.5rem 0.75rem;
    border-bottom: 1px solid var(--border);
    color: var(--text);
    vertical-align: middle;
  }
  td:nth-child(1), td:nth-child(2), td:nth-child(3) { text-align: center; color: var(--muted); font-size: 0.72rem; }
  td:nth-child(2) { font-weight: 600; }

  .round-label { font-family: 'Bebas Neue', sans-serif; font-size: 0.95rem; letter-spacing: 0.06em; }
  .rookie-round-label { color: var(--rookie); }

  .team-pill {
    display: inline-block;
    padding: 2px 9px;
    border-radius: 20px;
    font-size: 0.72rem;
    font-weight: 500;
    white-space: nowrap;
  }
  .rookie-badge {
    display: inline-block;
    background: var(--rookie-bg);
    color: var(--rookie);
    border: 1px solid var(--rookie-border);
    padding: 1px 7px;
    border-radius: 20px;
    font-size: 0.65rem;
    font-weight: 600;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    margin-left: 6px;
    vertical-align: middle;
  }
  .player-name { font-weight: 500; }
  .empty-name { color: var(--muted); font-style: italic; }

  /* ── No data state ── */
  .no-data {
    padding: 3rem 2rem;
    text-align: center;
    color: var(--muted);
  }
  .no-data h3 { font-family: 'Bebas Neue', sans-serif; font-size: 1.4rem; letter-spacing: 0.06em; margin-bottom: 0.5rem; color: var(--text); }
  .no-data p { font-size: 0.85rem; }

  /* ── Legend ── */
  .legend {
    display: flex;
    gap: 1rem;
    flex-wrap: wrap;
    padding: 0.5rem 2rem 0;
    margin-bottom: 0.75rem;
    align-items: center;
  }
  .legend-item { display: flex; align-items: center; gap: 6px; font-size: 0.72rem; color: var(--muted); }
  .legend-dot { width: 9px; height: 9px; border-radius: 50%; }

  /* ── Mobile tweaks ── */
  @media (max-width: 600px) {
    .header { padding: 1rem; }
    .tabs { padding: 0 1rem; }
    .div-header { padding: 0.75rem 1rem; }
    .legend { padding: 0.5rem 1rem 0; }
    .table-wrap { padding: 0 0 1.5rem; }
    thead th, td { padding: 0.45rem 0.5rem; font-size: 0.75rem; }
    .tab-btn { padding: 0.75rem 1rem; font-size: 1rem; }
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <h1>FFA Draft Night 2026</h1>
    <p>Live Draft Board &nbsp;·&nbsp; Read Only</p>
  </div>
  <div class="header-right">
    <div class="live-badge"><div class="live-dot"></div>Live</div>
    <div class="refresh-info">Refreshes in <span id="countdown">15</span>s</div>
  </div>
</div>

<div class="tabs">
  <button class="tab-btn active mens" onclick="switchTab('mens')">
    Men's Division <span class="tab-count" id="mens-count">—</span>
  </button>
  <button class="tab-btn womens" onclick="switchTab('womens')">
    Women's Division <span class="tab-count" id="womens-count">—</span>
  </button>
</div>

<!-- Men's Panel -->
<div class="tab-panel active" id="panel-mens">
  <div id="mens-content"></div>
</div>

<!-- Women's Panel -->
<div class="tab-panel" id="panel-womens">
  <div id="womens-content"></div>
</div>

<script>
// ── Config ──────────────────────────────────────────────────────────────────
const MENS_LS_KEY   = 'ffa_mens_draft_2026';
const WOMENS_LS_KEY = 'ffa_womens_draft_2026';
const REFRESH_SEC   = 15;

const MENS_CONFIG = {
  rounds: 10, teams: 6, rookieRound: 10,
  defaultTeams: ['Flamingo Fury','The Great Whites','The Salties','Moneyballers','Panthers','The Stags'],
  gmNames: {"Flamingo Fury":"Matthew Barbara","The Great Whites":"Rory Druce","The Salties":"Brodie Robinson","Moneyballers":"Bradley Howard","Panthers":"Tyrese Paul","The Stags":"Shayle Korander"},
  colors: ['#f97316','#22d3ee','#a78bfa','#34d399','#fb7185','#fbbf24'],
  accent: '#f97316'
};

const WOMENS_CONFIG = {
  rounds: 11, teams: 6, rookieRound: null,
  defaultTeams: ['Yeah Nah','Kunoichi','Bad Girls','5 Sheep','Red Flags','Suffragettes'],
  gmNames: {"Yeah Nah":"Tamika","Kunoichi":"Natsuko","Bad Girls":"Courtney","5 Sheep":"Marissa","Red Flags":"Denise","Suffragettes":"Bree"},
  colors: ['#f472b6','#a78bfa','#34d399','#fb923c','#60a5fa','#fbbf24'],
  accent: '#a78bfa'
};

// ── Helpers ──────────────────────────────────────────────────────────────────
function ord(n) { return ['st','nd','rd'][((n+90)%100-10)%10-1]||'th'; }

function buildSnakePicks(cfg) {
  const picks = [];
  let overall = 1;
  const baseOrder = Array.from({length: cfg.teams}, (_, i) => i);
  for (let r = 1; r <= cfg.rounds; r++) {
    const order = r % 2 === 1 ? [...baseOrder] : [...baseOrder].reverse();
    for (let p = 0; p < cfg.teams; p++) {
      picks.push({ overall, round: r, pickInRound: p+1, teamSlot: order[p], player: '', position: '' });
      overall++;
    }
  }
  return picks;
}

// ── Load state from localStorage ────────────────────────────────────────────
function loadDivision(lsKey, cfg) {
  const basePicks = buildSnakePicks(cfg);
  let teams = [...cfg.defaultTeams];
  let baseOrder = Array.from({length: cfg.teams}, (_, i) => i);

  try {
    const raw = localStorage.getItem(lsKey);
    if (raw) {
      const state = JSON.parse(raw);
      if (state.teams && state.teams.length === cfg.teams) teams = state.teams;
      if (state.baseOrder && state.baseOrder.length === cfg.teams) baseOrder = state.baseOrder;
      if (state.picks && state.picks.length > 0) {
        state.picks.forEach((sp, i) => {
          if (basePicks[i]) {
            basePicks[i].teamSlot = sp.teamSlot ?? basePicks[i].teamSlot;
            basePicks[i].player   = sp.player   || '';
            basePicks[i].position = sp.position || '';
          }
        });
      }
    }
  } catch(e) { console.warn('Could not load', lsKey, e); }

  return { teams, baseOrder, picks: basePicks };
}

// ── Render a division ────────────────────────────────────────────────────────
function renderDivision(containerId, countId, lsKey, cfg) {
  const { teams, picks } = loadDivision(lsKey, cfg);
  const container = document.getElementById(containerId);
  const countEl   = document.getElementById(countId);

  const filledPicks = picks.filter(p => p.player.trim()).length;
  const totalPicks  = picks.length;

  countEl.textContent = `${filledPicks}/${totalPicks}`;

  if (totalPicks === 0) {
    container.innerHTML = `<div class="no-data"><h3>No Data Yet</h3><p>The draft board hasn't been opened on this device.</p></div>`;
    return;
  }

  // Team summary: count picks per team
  const teamPickCounts = {};
  picks.forEach(p => {
    const name = teams[p.teamSlot] || `Team ${p.teamSlot+1}`;
    if (!teamPickCounts[name]) teamPickCounts[name] = { total: 0, filled: 0 };
    teamPickCounts[name].total++;
    if (p.player.trim()) teamPickCounts[name].filled++;
  });

  // Team cards
  let teamCardsHtml = `<div class="team-grid">`;
  teams.forEach((name, i) => {
    const color = cfg.colors[i];
    const gm = cfg.gmNames[cfg.defaultTeams[i]] || '';
    const tc = teamPickCounts[name] || { total: 0, filled: 0 };
    teamCardsHtml += `
      <div class="team-card" style="--tc:${color}">
        <div class="tc-label">Team ${i+1}</div>
        <div class="tc-name" style="color:${color}">${name}</div>
        ${gm ? `<div class="tc-gm">GM: ${gm}</div>` : ''}
        <div class="tc-picks"><b>${tc.filled}</b>/${tc.total} picks</div>
      </div>`;
  });
  teamCardsHtml += `</div>`;

  // Legend
  let legendHtml = `<div class="legend">
    <div class="legend-item"><div class="legend-dot" style="background:${cfg.accent}"></div>Regular pick</div>`;
  if (cfg.rookieRound) {
    legendHtml += `<div class="legend-item"><div class="legend-dot" style="background:var(--rookie)"></div>U18 Rookie round</div>`;
  }
  legendHtml += `</div>`;

  // Div header
  const divHeader = `
    <div class="div-header">
      <div>
        <div class="div-title" style="color:${cfg.accent}">${lsKey.includes('mens') ? "Men's Division" : "Women's Division"}</div>
        <div class="div-meta">${cfg.teams} Teams · Snake Draft · ${cfg.rounds} Round${cfg.rounds>1?'s':''}${cfg.rookieRound ? ' + U18 Rookie' : ''}</div>
      </div>
      <div class="picks-done"><b>${filledPicks}</b> of ${totalPicks} picks made</div>
    </div>`;

  // Table rows
  let rowsHtml = '';
  picks.forEach(p => {
    const isRookie = cfg.rookieRound && p.round === cfg.rookieRound;
    const isEmpty  = !p.player.trim();
    const color    = cfg.colors[p.teamSlot];
    const teamName = teams[p.teamSlot] || `Team ${p.teamSlot+1}`;

    let rowClass = '';
    if (p.pickInRound === 1) rowClass += ' round-start';
    if (isRookie) rowClass += ' rookie-row';
    if (isEmpty) rowClass += ' empty-pick';

    const rdLabel = isRookie
      ? `<span class="round-label rookie-round-label">${p.round}</span>`
      : `<span class="round-label" style="color:${cfg.accent}">${p.round}</span>`;

    const rookieBadge = isRookie ? `<span class="rookie-badge">U18</span>` : '';
    const playerCell  = isEmpty
      ? `<span class="empty-name">—</span>`
      : `<span class="player-name">${p.player}</span>${rookieBadge}`;
    const posCell = isEmpty ? '' : p.position;

    rowsHtml += `
      <tr class="${rowClass}">
        <td>${p.overall}</td>
        <td>${rdLabel}</td>
        <td>${p.pickInRound}</td>
        <td><span class="team-pill" style="background:${color}22;color:${color}">${teamName}</span></td>
        <td>${playerCell}</td>
        <td>${posCell}</td>
      </tr>`;
  });

  container.innerHTML = `
    ${divHeader}
    ${teamCardsHtml}
    ${legendHtml}
    <div class="table-wrap">
      <table>
        <thead><tr><th>#</th><th>Rd</th><th>Pk</th><th>Team</th><th>Player</th><th>Position</th></tr></thead>
        <tbody>${rowsHtml}</tbody>
      </table>
    </div>`;
}

// ── Tab switching ────────────────────────────────────────────────────────────
let activeTab = 'mens';
function switchTab(tab) {
  activeTab = tab;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.querySelector(`.tab-btn.${tab}`).classList.add('active');
  document.getElementById(`panel-${tab}`).classList.add('active');
}

// ── Refresh loop ─────────────────────────────────────────────────────────────
function refresh() {
  renderDivision('mens-content',   'mens-count',   MENS_LS_KEY,   MENS_CONFIG);
  renderDivision('womens-content', 'womens-count', WOMENS_LS_KEY, WOMENS_CONFIG);
}

let countdownVal = REFRESH_SEC;
function tick() {
  countdownVal--;
  document.getElementById('countdown').textContent = countdownVal;
  if (countdownVal <= 0) {
    refresh();
    countdownVal = REFRESH_SEC;
  }
}

// Initial render
refresh();
setInterval(tick, 1000);
</script>
</body>
</html>
