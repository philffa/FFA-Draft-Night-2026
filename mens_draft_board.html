<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Men's Draft Board</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery-autocomplete/1.0.0/jquery.auto-complete.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/jquery-autocomplete/1.0.0/jquery.auto-complete.css" />
    <style>
        /* Add any additional styles here */
    </style>
</head>
<body>
    <h1>Men's Draft Board</h1>
    <input type="text" id="player-search" placeholder="Search for players..." />
    <ul id="selected-players"></ul>

    <script>
        $(document).ready(function() {
            const players = [];
            const duplicateCheck = {};
            // Load players from the CSV file (replace with actual CSV loading)
            $.get('Mens 2026 Draft Declirations - Sheet1.csv', function(data) {
                const lines = data.split('\n');
                lines.forEach(line => {
                    const player = line.split(',')[0]; // Get player name from column A
                    if (player) {
                        players.push(player);
                    }
                });
                $('#player-search').autocomplete({
                    source: players,
                    select: function(event, ui) {
                        if (!duplicateCheck[ui.item.value]) {
                            $('#selected-players').append('<li>' + ui.item.value + '</li>');
                            duplicateCheck[ui.item.value] = true;
                        } else {
                            alert('Player already selected!');
                        }
                    }
                });
            });
        });
    </script>
</body>
</html>
