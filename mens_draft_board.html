<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Men's Division — Flag Football Draft Board</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0f14;
    --surface: #161920;
    --surface2: #1e2230;
    --border: rgba(255,255,255,0.08);
    --border-strong: rgba(255,255,255,0.18);
    --text: #f0f2f7;
    --muted: #6b7280;
    --accent: #f97316;
    --accent2: #fb923c;
    --rookie: #22d3ee;
    --rookie-bg: rgba(34,211,238,0.08);
    --rookie-border: rgba(34,211,238,0.3);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; }

  .header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 1.5rem 2rem;
    display: flex;
    align-items: center;
    gap: 1.5rem;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .header-titles { flex: 1; }
  .header h1 { font-family: 'Bebas Neue', sans-serif; font-size: 2rem; letter-spacing: 0.06em; color: var(--accent); line-height: 1; }
  .header p { font-size: 0.8rem; color: var(--muted); letter-spacing: 0.04em; text-transform: uppercase; margin-top: 3px; }

  .announce-bar {
    background: var(--surface2);
    border-left: 3px solid var(--accent);
    padding: 0.7rem 1.25rem;
    font-size: 0.9rem;
    color: var(--muted);
    font-style: italic;
    flex: 1;
    border-radius: 0 6px 6px 0;
    min-width: 0;
  }
  .announce-bar b { color: var(--text); font-style: normal; font-weight: 500; }

  .toolbar {
    padding: 0.75rem 2rem;
    display: flex;
    gap: 0.6rem;
    flex-wrap: wrap;
    align-items: center;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
  }
  .btn {
    padding: 0.45rem 1rem;
    border-radius: 6px;
    border: 1px solid var(--border-strong);
    background: transparent;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.82rem;
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s;
  }
  .btn:hover { background: var(--surface2); border-color: var(--accent); color: var(--accent); }
  .btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }
  .btn.danger:hover { border-color: #ef4444; color: #ef4444; }

  .trade-panel {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 1.25rem 2rem;
    display: none;
  }
  .trade-panel h3 { font-family: 'Bebas Neue', sans-serif; font-size: 1.1rem; letter-spacing: 0.05em; color: var(--accent); margin-bottom: 0.75rem; }
  .trade-row { display: flex; gap: 1rem; align-items: center; flex-wrap: wrap; margin-bottom: 0.6rem; }
  .trade-row label { font-size: 0.8rem; color: var(--muted); min-width: 55px; }
  select {
    background: var(--surface2);
    border: 1px solid var(--border-strong);
    color: var(--text);
    padding: 0.4rem 0.75rem;
    border-radius: 6px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.82rem;
    cursor: pointer;
  }

  .main { padding: 1.5rem 2rem; }

  .team-grid {
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    gap: 8px;
    margin-bottom: 1.5rem;
  }
  .team-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0.6rem 0.75rem;
    border-top: 3px solid var(--team-color);
  }
  .team-card label { font-size: 0.7rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.04em; display: block; margin-bottom: 4px; }
  .team-card input {
    width: 100%;
    background: transparent;
    border: none;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.82rem;
    font-weight: 500;
    outline: none;
    padding: 0;
  }
  .team-card input:focus { color: var(--accent); }

  table { width: 100%; border-collapse: collapse; font-size: 0.82rem; }
  thead th {
    background: var(--surface);
    color: var(--muted);
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    font-weight: 500;
    padding: 0.6rem 0.75rem;
    text-align: left;
    border-bottom: 1px solid var(--border-strong);
    position: sticky;
    top: 85px;
  }
  thead th:nth-child(1), thead th:nth-child(2), thead th:nth-child(3) { width: 52px; text-align: center; }
  thead th:nth-child(4) { width: 140px; }
  thead th:nth-child(6) { width: 110px; }

  tbody tr { cursor: pointer; transition: background 0.1s; }
  tbody tr:hover td { background: var(--surface); }
  tbody tr.selected td { background: rgba(249,115,22,0.1); }
  tbody tr.selected td:nth-child(1) { border-left: 3px solid var(--accent); }

  tbody tr.rookie-round td { background: var(--rookie-bg); }
  tbody tr.rookie-round:hover td { background: rgba(34,211,238,0.12); }
  tbody tr.rookie-round.selected td { background: rgba(34,211,238,0.18); }
  tbody tr.rookie-round.selected td:nth-child(1) { border-left: 3px solid var(--rookie); }

  tbody tr.round-start td { border-top: 1px solid var(--border-strong); }

  td {
    padding: 0.55rem 0.75rem;
    border-bottom: 1px solid var(--border);
    color: var(--text);
    vertical-align: middle;
  }
  td:nth-child(1), td:nth-child(2), td:nth-child(3) { text-align: center; color: var(--muted); font-size: 0.75rem; }
  td:nth-child(2) { font-weight: 600; }

  .team-pill {
    display: inline-block;
    padding: 2px 9px;
    border-radius: 20px;
    font-size: 0.75rem;
    font-weight: 500;
    white-space: nowrap;
  }
  .rookie-badge {
    display: inline-block;
    background: var(--rookie-bg);
    color: var(--rookie);
    border: 1px solid var(--rookie-border);
    padding: 1px 7px;
    border-radius: 20px;
    font-size: 0.68rem;
    font-weight: 600;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    margin-left: 6px;
    vertical-align: middle;
  }
  .editable {
    width: 100%;
    border: none;
    background: transparent;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.82rem;
    outline: none;
    padding: 0;
  }
  .editable:focus { color: #fff; }
  .editable::placeholder { color: var(--muted); }

  .round-label {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 0.95rem;
    letter-spacing: 0.06em;
    color: var(--accent);
  }
  .rookie-round-label { color: var(--rookie); }

  .legend { display: flex; gap: 1rem; flex-wrap: wrap; margin-bottom: 1rem; align-items: center; }
  .legend-item { display: flex; align-items: center; gap: 6px; font-size: 0.75rem; color: var(--muted); }
  .legend-dot { width: 10px; height: 10px; border-radius: 50%; }
</style>
</head>
<body>

<div class="header">
  <div class="header-titles">
    <h1>Men's Division</h1>
    <p>Flag Football Draft &nbsp;·&nbsp; 6 Teams &nbsp;·&nbsp; Snake Draft &nbsp;·&nbsp; 9 Rounds + Rookie Round</p>
  </div>
  <div class="announce-bar" id="announce-bar">Select a pick to see the draft announcement.</div>
</div>

<div class="toolbar">
  <button class="btn" id="trade-btn" onclick="toggleTrade()">Swap picks (trade)</button>
  <button class="btn danger" onclick="clearAll()">Clear all picks</button>
  <button class="btn" onclick="copyAnnouncements()">Copy all announcements</button>
</div>

<div class="trade-panel" id="trade-panel">
  <h3>Swap Picks</h3>
  <div class="trade-row">
    <label>Pick A</label>
    <select id="trade-a"></select>
  </div>
  <div class="trade-row">
    <label>Pick B</label>
    <select id="trade-b"></select>
  </div>
  <div style="display:flex;gap:8px;margin-top:0.75rem;">
    <button class="btn active" onclick="executeTrade()">Confirm swap</button>
    <button class="btn" onclick="toggleTrade()">Cancel</button>
  </div>
</div>

<div class="main">
  <div class="team-grid" id="team-grid"></div>
  <div class="legend">
    <div class="legend-item"><div class="legend-dot" style="background:var(--accent)"></div>Regular pick</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--rookie)"></div>Rookie round (U18)</div>
  </div>
  <table>
    <thead>
      <tr><th>#</th><th>Rd</th><th>Pk</th><th>Team</th><th>Player name</th><th>Position</th></tr>
    </thead>
    <tbody id="draft-body"></tbody>
  </table>
</div>

<script>
const ROUNDS = 10, TEAMS = 6, ROOKIE_ROUND = 10;
const TEAM_COLORS = ['#f97316','#22d3ee','#a78bfa','#34d399','#fb7185','#fbbf24'];

const DEFAULT_TEAMS = ['Flamingo Fury','The Great Whites','The Salties','Moneyballers','Panthers','The Stags'];
let teams = [...DEFAULT_TEAMS];
let picks = [];
let selectedIdx = null;

function snakeOrder() {
  picks = [];
  let overall = 1;
  for (let r = 1; r <= ROUNDS; r++) {
    let slots = r % 2 === 1
      ? Array.from({length:TEAMS},(_,i)=>i)
      : Array.from({length:TEAMS},(_,i)=>TEAMS-1-i);
    for (let p = 0; p < TEAMS; p++) {
      picks.push({ overall, round: r, pickInRound: p+1, teamSlot: slots[p], player:'', position:'' });
      overall++;
    }
  }
}

function buildTeamCards() {
  const grid = document.getElementById('team-grid');
  grid.innerHTML = '';
  teams.forEach((name, i) => {
    const card = document.createElement('div');
    card.className = 'team-card';
    card.style.setProperty('--team-color', TEAM_COLORS[i]);
    card.innerHTML = `<label>Team ${i+1}</label><input value="${name}" oninput="teams[${i}]=this.value;renderTable();buildTradeSelects()">`;
    grid.appendChild(card);
  });
}

function buildTradeSelects() {
  ['trade-a','trade-b'].forEach((id, idx) => {
    const sel = document.getElementById(id);
    const prev = sel.value;
    sel.innerHTML = picks.map(p =>
      `<option value="${p.overall-1}">Pick ${p.overall} (Rd ${p.round} Pk ${p.pickInRound}) — ${teams[p.teamSlot]}</option>`
    ).join('');
    sel.value = prev || (idx === 1 && picks.length > 1 ? '1' : '0');
  });
}

function ord(n) { return ['st','nd','rd'][((n+90)%100-10)%10-1]||'th'; }

function isRookie(r) { return r === ROOKIE_ROUND; }

function renderTable() {
  const tbody = document.getElementById('draft-body');
  tbody.innerHTML = '';
  picks.forEach((p, i) => {
    const tr = document.createElement('tr');
    if (p.pickInRound === 1) tr.classList.add('round-start');
    if (isRookie(p.round)) tr.classList.add('rookie-round');
    if (selectedIdx === i) tr.classList.add('selected');
    tr.onclick = () => selectPick(i);

    const color = TEAM_COLORS[p.teamSlot];
    const teamName = teams[p.teamSlot] || `Team ${p.teamSlot+1}`;
    const rdLabel = isRookie(p.round)
      ? `<span class="round-label rookie-round-label">${p.round}</span>`
      : `<span class="round-label">${p.round}</span>`;
    const posPlaceholder = isRookie(p.round) ? 'Position (U18)' : 'Position';
    const rookieBadge = isRookie(p.round) ? `<span class="rookie-badge">U18</span>` : '';

    tr.innerHTML = `
      <td>${p.overall}</td>
      <td>${rdLabel}</td>
      <td>${p.pickInRound}</td>
      <td><span class="team-pill" style="background:${color}22;color:${color}">${teamName}</span></td>
      <td>
        <input class="editable" value="${p.player}" placeholder="Player name"
          oninput="picks[${i}].player=this.value;if(selectedIdx===${i})updateAnnounce(${i})"
          onclick="event.stopPropagation();selectPick(${i})">
        ${rookieBadge}
      </td>
      <td><input class="editable" value="${p.position}" placeholder="${posPlaceholder}"
        oninput="picks[${i}].position=this.value;if(selectedIdx===${i})updateAnnounce(${i})"
        onclick="event.stopPropagation();selectPick(${i})"></td>
    `;
    tbody.appendChild(tr);
  });
}

function selectPick(i) {
  selectedIdx = i;
  document.querySelectorAll('tbody tr').forEach((r,idx) => {
    r.classList.toggle('selected', idx === i);
  });
  updateAnnounce(i);
}

function updateAnnounce(i) {
  const p = picks[i];
  const team = teams[p.teamSlot] || `Team ${p.teamSlot+1}`;
  const player = p.player || '[Player Name]';
  const pos = p.position || '[Position]';
  const bar = document.getElementById('announce-bar');
  const rookiePart = isRookie(p.round) ? `, <b>U18 Rookie pick</b>` : '';
  bar.innerHTML = `"With the <b>${p.pickInRound}${ord(p.pickInRound)} pick of Round ${p.round}</b>, <b>${team}</b> selects <b>${player}</b>, <b>${pos}</b>${rookiePart}."`;
}

function toggleTrade() {
  const panel = document.getElementById('trade-panel');
  const btn = document.getElementById('trade-btn');
  const open = panel.style.display === 'block';
  panel.style.display = open ? 'none' : 'block';
  btn.classList.toggle('active', !open);
  if (!open) buildTradeSelects();
}

function executeTrade() {
  const a = parseInt(document.getElementById('trade-a').value);
  const b = parseInt(document.getElementById('trade-b').value);
  if (a === b) return;
  [picks[a].teamSlot, picks[b].teamSlot] = [picks[b].teamSlot, picks[a].teamSlot];
  renderTable();
  buildTradeSelects();
}

function clearAll() {
  const btn = document.querySelector('.btn.danger');
  if (btn.dataset.confirming) {
    picks.forEach(p => { p.player = ''; p.position = ''; });
    selectedIdx = null;
    document.getElementById('announce-bar').innerHTML = 'Select a pick to see the draft announcement.';
    renderTable();
    btn.textContent = 'Clear all picks';
    delete btn.dataset.confirming;
  } else {
    btn.dataset.confirming = '1';
    btn.textContent = 'Tap again to confirm';
    setTimeout(() => {
      btn.textContent = 'Clear all picks';
      delete btn.dataset.confirming;
    }, 3000);
  }
}

function copyAnnouncements() {
  const lines = picks.map(p => {
    const team = teams[p.teamSlot] || `Team ${p.teamSlot+1}`;
    const player = p.player || '[Player Name]';
    const pos = p.position || '[Position]';
    const rookiePart = isRookie(p.round) ? ', U18 Rookie pick' : '';
    return `"With the ${p.pickInRound}${ord(p.pickInRound)} pick of Round ${p.round}, ${team} selects ${player}, ${pos}${rookiePart}."`;
  });
  navigator.clipboard.writeText(lines.join('\n')).then(() => alert('All announcements copied to clipboard!'));
}

snakeOrder();
buildTeamCards();
renderTable();
</script>
</body>
</html>
